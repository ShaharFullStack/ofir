  <style>
    :root {
      --bg: #07070d;
      --surface: rgba(14, 14, 24, 0.82);
      --surface-border: rgba(255, 255, 255, 0.08);
      --text: #dde0f0;
      --muted: #aeb4d0;
      --dim: #5f647e;
      --c0: #00e676;
      --c1: #40c4ff;
      --c2: #ffab40;
      --c3: #ff5252;
      --c4: #e040fb;
      --shadow: 0 18px 60px rgba(0, 0, 0, 0.45);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --container-width: 460px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
    }

    body {
      font-family: "Noto Sans Hebrew", sans-serif;
      color: var(--text);
      background-color: var(--bg);
      background-image:
        linear-gradient(rgba(7, 7, 13, 0.58), rgba(7, 7, 13, 0.78)),
        url("music_bg_1774431375976.png");
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding:
        max(20px, env(safe-area-inset-top))
        16px
        max(20px, env(safe-area-inset-bottom));
    }

    .panel {
      width: 100%;
      max-width: var(--container-width);
      padding: 28px 20px 20px;
      border: 1px solid var(--surface-border);
      border-radius: var(--radius-xl);
      background: var(--surface);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
    }

    .hero {
      text-align: center;
      margin-bottom: 22px;
      animation: fade-in 0.55s ease-out both;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3.2rem);
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: -0.02em;
      background: linear-gradient(
        135deg,
        var(--c0),
        var(--c1),
        var(--c2),
        var(--c4)
      );
      background-size: 250% 250%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: gradient-shift 5s ease infinite;
    }

    .hero p {
      margin: 12px 0 0;
      font-size: 1rem;
      line-height: 1.6;
      color: var(--muted);
      font-weight: 300;
    }

    .games {
      display: grid;
      gap: 14px;
      animation: slide-up 0.75s ease-out both;
    }

    .game-card {
      position: relative;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 16px;
      text-decoration: none;
      color: inherit;
      border: 1px solid var(--surface-border);
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.03);
      overflow: hidden;
      transition:
        transform 0.22s ease,
        border-color 0.22s ease,
        background 0.22s ease,
        box-shadow 0.22s ease;
      min-height: 88px;
    }

    .game-card::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.22s ease;
      background: linear-gradient(
        135deg,
        rgba(255, 255, 255, 0.08),
        rgba(255, 255, 255, 0)
      );
    }

    .game-card:hover,
    .game-card:focus-visible {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.05);
      outline: none;
    }

    .game-card:hover::before,
    .game-card:focus-visible::before {
      opacity: 1;
    }

    .game-card:focus-visible {
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.08);
    }

    .game-card.theme-green {
      border-color: rgba(0, 230, 118, 0.35);
    }

    .game-card.theme-green:hover,
    .game-card.theme-green:focus-visible {
      border-color: var(--c0);
      box-shadow: 0 10px 28px rgba(0, 230, 118, 0.14);
    }

    .game-card.theme-blue {
      border-color: rgba(64, 196, 255, 0.35);
    }

    .game-card.theme-blue:hover,
    .game-card.theme-blue:focus-visible {
      border-color: var(--c1);
      box-shadow: 0 10px 28px rgba(64, 196, 255, 0.14);
    }

    .game-card.theme-purple {
      border-color: rgba(224, 64, 251, 0.35);
    }

    .game-card.theme-purple:hover,
    .game-card.theme-purple:focus-visible {
      border-color: var(--c4);
      box-shadow: 0 10px 28px rgba(224, 64, 251, 0.14);
    }

    .game-icon-wrap {
      flex: 0 0 54px;
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
    }

    .game-icon {
      width: 40px;
      height: 40px;
      object-fit: contain;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.35));
    }

    .game-content {
      min-width: 0;
      flex: 1;
    }

    .game-title {
      display: block;
      font-size: 1.08rem;
      font-weight: 800;
      line-height: 1.3;
    }

    .game-description {
      display: block;
      margin-top: 4px;
      font-size: 0.9rem;
      line-height: 1.5;
      color: var(--muted);
      font-weight: 400;
    }

    .game-arrow {
      flex: 0 0 auto;
      font-size: 1.15rem;
      color: var(--dim);
      transform: translateX(0);
      transition: transform 0.22s ease, color 0.22s ease;
    }

    .game-card:hover .game-arrow,
    .game-card:focus-visible .game-arrow {
      color: var(--text);
      transform: translateX(-4px);
    }

    @keyframes fade-in {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes slide-up {
      from {
        opacity: 0;
        transform: translateY(28px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes gradient-shift {
      0%,
      100% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
    }

    @media (max-width: 640px) {
      .panel {
        padding: 22px 14px 14px;
        border-radius: 20px;
      }

      .hero p {
        font-size: 0.94rem;
      }

      .game-card {
        padding: 16px 14px;
        min-height: 82px;
      }

      .game-icon-wrap {
        width: 48px;
        height: 48px;
      }

      .game-icon {
        width: 34px;
        height: 34px;
      }

      .game-title {
        font-size: 1rem;
      }

      .game-description {
        font-size: 0.84rem;
      }
    }

    @media (max-height: 620px) {
      .page {
        align-items: start;
      }

      .panel {
        margin-top: 12px;
      }

      .hero {
        margin-bottom: 16px;
      }

      .hero h1 {
        font-size: 1.75rem;
      }

      .hero p {
        font-size: 0.88rem;
        margin-top: 8px;
      }

      .games {
        gap: 10px;
      }

      .game-card {
        min-height: 68px;
        padding: 12px 14px;
      }

      .game-description {
        display: none;
      }

      .game-icon-wrap {
        width: 42px;
        height: 42px;
        border-radius: 12px;
      }

      .game-icon {
        width: 28px;
        height: 28px;
      }
    }
  </style>
</head>
<body>

  <script src="hamburger-menu.js"></script>
