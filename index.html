<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>משחקים מוזיקליים</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #07070d;
            --surface: #0e0e18;
            --text: #dde0f0;
            --dim: #42445a;
            --c0: #00e676;
            --c1: #40c4ff;
            --c2: #ffab40;
            --c3: #ff5252;
            --c4: #e040fb;
            --c5: #64ffda;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Noto Sans Hebrew', sans-serif;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* GRAIN OVERLAY */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            opacity: 0.025;
            pointer-events: none;
            z-index: 1;
        }

        .container {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 10;
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeIn 0.6s ease-out;
        }

        .header h1 {
            font-size: 3em;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--c0), var(--c1), var(--c2), var(--c4));
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 4s ease infinite;
        }

        .header p {
            font-size: 1.1em;
            color: var(--dim);
            font-weight: 300;
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 350px;
            animation: slideUp 0.8s ease-out;
        }

        .game-button {
            position: relative;
            padding: 25px 30px;
            border: 2px solid var(--dim);
            background: var(--surface);
            color: var(--text);
            font-size: 1.3em;
            font-weight: 700;
            text-decoration: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            text-align: center;
            overflow: hidden;
            font-family: 'Noto Sans Hebrew', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            min-height: 70px;
        }

        .game-button::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 0%, rgba(255, 255, 255, 0.1) 100%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .game-button:hover {
            border-color: var(--text);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .game-button:active {
            transform: translateY(0);
        }

        .game-button.btn1 {
            border-color: var(--c0);
            color: var(--c0);
        }

        .game-button.btn1:hover {
            background: rgba(0, 230, 118, 0.1);
            box-shadow: 0 0 20px rgba(0, 230, 118, 0.3), inset 0 0 20px rgba(0, 230, 118, 0.05);
        }

        .game-button.btn2 {
            border-color: var(--c1);
            color: var(--c1);
        }

        .game-button.btn2:hover {
            background: rgba(64, 196, 255, 0.1);
            box-shadow: 0 0 20px rgba(64, 196, 255, 0.3), inset 0 0 20px rgba(64, 196, 255, 0.05);
        }

        .game-button.btn3 {
            border-color: var(--c4);
            color: var(--c4);
        }

        .game-button.btn3:hover {
            background: rgba(224, 64, 251, 0.1);
            box-shadow: 0 0 20px rgba(224, 64, 251, 0.3), inset 0 0 20px rgba(224, 64, 251, 0.05);
        }

        .game-icon {
            font-size: 1.5em;
        }

        .game-text {
            flex: 1;
        }

        .game-label {
            display: block;
            font-size: 0.8em;
            opacity: 0.7;
            margin-top: 5px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 2.2em;
            }

            .header p {
                font-size: 0.95em;
            }

            .game-button {
                padding: 20px 25px;
                font-size: 1.1em;
                min-height: 60px;
            }

            .menu {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎵 משחקים מוזיקליים</h1>
            <p>בחר משחק להתחיל</p>
        </div>

        <div class="menu">
            <a href="muzikay.html" class="game-button btn1">
                <span class="game-icon">🎸</span>
                <span class="game-text">
                    <span>מוזיקאי</span>
                    <span class="game-label">משחק הקצב</span>
                </span>
            </a>

            <a href="muzikay1.html" class="game-button btn2">
                <span class="game-icon">🎯</span>
                <span class="game-text">
                    <span>משחק מוזיקלי I</span>
                    <span class="game-label">נגן את התווים</span>
                </span>
            </a>

            <a href="muzikay2.html" class="game-button btn3">
                <span class="game-icon">👂</span>
                <span class="game-text">
                    <span>אוזן מוזיקלית</span>
                    <span class="game-label">זיהוי תווים</span>
                </span>
            </a>
        </div>
    </div>
</body>
</html>
