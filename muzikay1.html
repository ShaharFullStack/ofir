<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>משחק מוזיקלי למובייל</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #1a1a2e;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* מניעת גלילה */
            touch-action: none; /* מניעת פעולות מגע דיפולטיביות של הדפדפן כמו Pull-to-refresh */
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            font-weight: bold;
            z-index: 10;
            pointer-events: none;
        }

        #game-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .target {
            position: absolute;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 20px;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            transition: transform 0.1s ease-out;
            /* מרכז את העיגול ביחס לנקודת הציון שלו */
            transform: translate(-50%, -50%); 
        }

        .target:active {
            transform: translate(-50%, -50%) scale(1.2);
        }

        #start-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(26, 26, 46, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }

        button {
            padding: 15px 40px;
            font-size: 24px;
            background-color: #e94560;
            color: white;
            border: none;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(233, 69, 96, 0.4);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div>ניקוד: <span id="score">0</span></div>
        <div>זמן: <span id="timer">30</span></div>
    </div>

    <div id="game-area"></div>

    <div id="start-overlay">
        <h1 style="margin-bottom: 30px;">הקצב שלך</h1>
        <button id="start-btn">התחל לנגן</button>
    </div>

    <script>
        // הגדרות המשחק
        let score = 0;
        let timeLeft = 30;
        let gameInterval;
        let timerInterval;
        let synth;

        // סולם פנטטוני (נשמע טוב בכל סדר)
        const notes = ["C4", "D4", "E4", "G4", "A4", "C5"];
        const colors = ["#ff9a9e", "#fecfef", "#a18cd1", "#fbc2eb", "#8fd3f4", "#84fab0"];

        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const gameArea = document.getElementById('game-area');
        const startOverlay = document.getElementById('start-overlay');
        const startBtn = document.getElementById('start-btn');

        // אתחול המשחק
        async function initGame() {
            // חובה להפעיל את האודיו רק אחרי אינטראקציית משתמש (מדיניות דפדפנים)
            await Tone.start();
            
            // יצירת סינתיסייזר פוליפוני כדי לאפשר נגינת מספר תווים יחד
            synth = new Tone.PolySynth(Tone.Synth).toDestination();
            
            startOverlay.style.display = 'none';
            score = 0;
            timeLeft = 30;
            scoreEl.innerText = score;
            timerEl.innerText = timeLeft;
            gameArea.innerHTML = '';

            startGameLoop();
        }

        function startGameLoop() {
            // יצירת מטרה חדשה כל 800 מילישניות
            gameInterval = setInterval(spawnTarget, 800);
            
            // טיימר המשחק
            timerInterval = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft;
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function spawnTarget() {
            const target = document.createElement('div');
            target.classList.add('target');
            
            // גודל אקראי מותאם לאצבע
            const size = Math.floor(Math.random() * 40) + 70; 
            target.style.width = `${size}px`;
            target.style.height = `${size}px`;

            // מיקום אקראי (תוך שמירה על שוליים כדי שלא יחרוג מהמסך)
            const x = Math.max(size/2, Math.random() * (window.innerWidth - size/2));
            const y = Math.max(size/2 + 60, Math.random() * (window.innerHeight - size/2));
            
            target.style.left = `${x}px`;
            target.style.top = `${y}px`;

            // בחירת תו וצבע אקראיים
            const noteIndex = Math.floor(Math.random() * notes.length);
            const note = notes[noteIndex];
            target.style.backgroundColor = colors[noteIndex];

            // שימוש ב-touchstart מאפשר תגובה מיידית במובייל ללא הדיליי של 300ms שיש ל-click
            target.addEventListener('touchstart', (e) => {
                e.preventDefault(); // מניעת גלילה או זום אקראיים בעת הלחיצה
                hitTarget(target, note);
            });
            
            // תמיכה גם בעכבר למקרה שבודקים בדסקטופ
            target.addEventListener('mousedown', (e) => {
                hitTarget(target, note);
            });

            gameArea.appendChild(target);

            // המטרה נעלמת אחרי 1.5 שניות אם לא נלחצה
            setTimeout(() => {
                if (target.parentElement) {
                    target.style.opacity = '0';
                    target.style.transform = 'translate(-50%, -50%) scale(0.1)';
                    setTimeout(() => target.remove(), 200);
                }
            }, 1500);
        }

        function hitTarget(target, note) {
            // נגינת התו
            synth.triggerAttackRelease(note, "8n");
            
            // עדכון ניקוד
            score += 10;
            scoreEl.innerText = score;

            // אפקט חזותי להעלמת המטרה
            target.style.transition = 'all 0.1s';
            target.style.transform = 'translate(-50%, -50%) scale(1.5)';
            target.style.opacity = '0';
            
            setTimeout(() => {
                if (target.parentElement) target.remove();
            }, 100);
        }

        function endGame() {
            clearInterval(gameInterval);
            clearInterval(timerInterval);
            gameArea.innerHTML = '';
            
            startOverlay.style.display = 'flex';
            startOverlay.innerHTML = `
                <h1 style="margin-bottom: 10px;">הזמן נגמר!</h1>
                <h2 style="margin-bottom: 30px;">הניקוד שלך: ${score}</h2>
                <button id="restart-btn" onclick="initGame()">שחק שוב</button>
            `;
        }

        startBtn.addEventListener('click', initGame);
    </script>
</body>
</html>
